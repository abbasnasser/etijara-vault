info:
  name: POST /api/v1/products/:id/images
  type: http
  seq: 8

http:
  method: POST
  url: {{base_url}}/api/v1/products/:id/images
  auth:
    type: bearer
    token: {{auth_token}}
  body:
    mode: json
    json: |-
      {
        "image": {
          "src": "https://example.com/image.jpg",
          "alt": null,
          "position": 0
        },
        "url": "https://example.com/image.jpg",
        "altText": null,
        "position": 0
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
