info:
  name: POST /api/v1/customers
  type: http
  seq: 2

http:
  method: POST
  url: {{base_url}}/api/v1/customers
  auth:
    type: bearer
    token: {{auth_token}}
  body:
    mode: json
    json: |-
      {
        "email": "user@example.com",
        "first_name": "John",
        "last_name": "Doe",
        "phone": "+966501234567",
        "address": null,
        "city": null,
        "state": null,
        "zip_code": null,
        "country": null,
        "customer_type": "",
        "notes": "Some notes here",
        "newsletter": false,
        "notify_orders": false,
        "preferred_carrier": null
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
