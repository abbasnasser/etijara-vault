info:
  name: POST /api/v1/auth/reset-password
  type: http
  seq: 5

http:
  method: POST
  url: {{base_url}}/api/v1/auth/reset-password
  auth:
    type: bearer
    token: {{auth_token}}
  body:
    mode: json
    json: |-
      {
        "email": "user@example.com",
        "otp": "123456",
        "newPassword": "yourpassword123"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
