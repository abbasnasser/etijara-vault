info:
  name: POST /api/v1/auth/signup
  type: http
  seq: 1

http:
  method: POST
  url: {{base_url}}/api/v1/auth/signup
  auth:
    type: bearer
    token: {{auth_token}}
  body:
    mode: json
    json: |-
      {
        "email": "user@example.com",
        "password": "yourpassword123",
        "firstName": "John",
        "lastName": "Doe"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
